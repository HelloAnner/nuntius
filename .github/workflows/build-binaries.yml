name: Build binaries

run-name: Build binaries · ${{ github.ref_name }} · ${{ github.sha }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Cargo.lock currently includes SQLx 0.9, whose MSRV is Rust 1.94.
  RUST_VERSION: "1.94.0"
  NUNTIUS_BUILD_SEQUENCE: ${{ github.run_id }}

jobs:
  frontend:
    name: Frontend · build and typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: frontend-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck frontends
        run: bun run typecheck

      - name: Build frontends
        run: bun run build

      - name: Upload embedded frontends
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-${{ github.sha }}
          path: |
            client/frontend/dist
            server/frontend/dist
          if-no-files-found: error
          retention-days: 1

  test:
    name: Rust · workspace tests
    needs: frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Restore embedded frontends
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-${{ github.sha }}
          path: .

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"

      - name: Run workspace tests
        run: cargo test --locked --workspace

  server-linux-x86_64:
    name: Server · CentOS 7 x86_64
    needs: frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    concurrency:
      group: server-linux-x86_64-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Restore embedded frontends
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-${{ github.sha }}
          path: .

      - name: Build native CentOS 7 server
        run: |
          docker run --rm \
            -e RUST_VERSION="$RUST_VERSION" \
            -e NUNTIUS_BUILD_SHA="$GITHUB_SHA" \
            -e NUNTIUS_BUILD_SEQUENCE="$NUNTIUS_BUILD_SEQUENCE" \
            -e NUNTIUS_BUILD_TARGET="x86_64-unknown-linux-gnu" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            quay.io/pypa/manylinux2014_x86_64 \
            /bin/bash -lc '
              set -euo pipefail
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain "$RUST_VERSION"
              source "$HOME/.cargo/env"
              cargo build --locked --release --package nuntius-server
              target/release/nuntius-server build-info
            '

      - name: Verify CentOS compatibility
        run: |
          test "$(uname -m)" = "x86_64"
          file target/release/nuntius-server
          max_glibc="$(strings target/release/nuntius-server \
            | grep -oE 'GLIBC_[0-9]+\.[0-9]+' \
            | sort -Vu \
            | tail -1)"
          highest="$(printf '%s\n' "$max_glibc" 'GLIBC_2.17' | sort -V | tail -1)"
          test "$highest" = "GLIBC_2.17"

      - name: Package server
        run: |
          mkdir -p package
          cp target/release/nuntius-server package/
          cd package
          sha256sum nuntius-server > SHA256SUMS
          tar -czf ../nuntius-server-linux-x86_64.tar.gz nuntius-server SHA256SUMS

      - name: Upload server artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: nuntius-server-linux-x86_64-${{ github.sha }}
          path: nuntius-server-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Add server download link to summary
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          {
            echo "## Server · CentOS 7 x86_64"
            echo
            echo "[Download nuntius-server-linux-x86_64.tar.gz]($ARTIFACT_URL)"
            echo
            echo "Artifact SHA-256: \`$ARTIFACT_DIGEST\`"
            echo
            echo "Source commit: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

  client-macos-arm64:
    name: Client · macOS ARM64
    needs: frontend
    runs-on: macos-14
    timeout-minutes: 40
    concurrency:
      group: client-macos-arm64-${{ github.ref }}
      cancel-in-progress: true
    env:
      NUNTIUS_BUILD_SHA: ${{ github.sha }}
      NUNTIUS_BUILD_TARGET: aarch64-apple-darwin

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Restore embedded frontends
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-${{ github.sha }}
          path: .

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"

      - name: Verify runner architecture
        run: test "$(uname -m)" = "arm64"

      - name: Build client
        run: |
          cargo build --locked --release --package nuntius-client
          target/release/nuntius-client build-info

      - name: Package client
        run: |
          mkdir -p package
          cp target/release/nuntius-client package/
          cd package
          shasum -a 256 nuntius-client > SHA256SUMS
          tar -czf ../nuntius-client-macos-arm64.tar.gz nuntius-client SHA256SUMS

      - name: Upload client artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: nuntius-client-macos-arm64-${{ github.sha }}
          path: nuntius-client-macos-arm64.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Add client download link to summary
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          {
            echo "## Client · macOS ARM64"
            echo
            echo "[Download nuntius-client-macos-arm64.tar.gz]($ARTIFACT_URL)"
            echo
            echo "Artifact SHA-256: \`$ARTIFACT_DIGEST\`"
            echo
            echo "Source commit: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-continuous:
    name: Publish · continuous self-update channel
    needs: [test, server-linux-x86_64, client-macos-arm64]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: continuous-release-publisher
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Reject a superseded main build
        id: head
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          current_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq .sha)"
          if [ "$current_sha" = "$EXPECTED_SHA" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping superseded build $EXPECTED_SHA; main is now $current_sha." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Download server artifact
        if: steps.head.outputs.publish == 'true'
        uses: actions/download-artifact@v8
        with:
          name: nuntius-server-linux-x86_64-${{ github.sha }}
          path: release

      - name: Download client artifact
        if: steps.head.outputs.publish == 'true'
        uses: actions/download-artifact@v8
        with:
          name: nuntius-client-macos-arm64-${{ github.sha }}
          path: release

      - name: Build signed-by-checksum update manifest
        if: steps.head.outputs.publish == 'true'
        working-directory: release
        run: |
          release_sequence="$GITHUB_RUN_ID"
          asset_revision="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          server_asset="nuntius-server-linux-x86_64-${GITHUB_SHA}-${asset_revision}.tar.gz"
          client_asset="nuntius-client-macos-arm64-${GITHUB_SHA}-${asset_revision}.tar.gz"
          mv nuntius-server-linux-x86_64.tar.gz "$server_asset"
          mv nuntius-client-macos-arm64.tar.gz "$client_asset"
          server_sha="$(sha256sum "$server_asset" | cut -d' ' -f1)"
          client_sha="$(sha256sum "$client_asset" | cut -d' ' -f1)"
          jq -n \
            --arg commitSha "$GITHUB_SHA" \
            --argjson releaseSequence "$release_sequence" \
            --arg publishedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg serverAsset "$server_asset" \
            --arg clientAsset "$client_asset" \
            --arg serverSha "$server_sha" \
            --arg clientSha "$client_sha" \
            '{
              schemaVersion: 1,
              commitSha: $commitSha,
              releaseSequence: $releaseSequence,
              publishedAt: $publishedAt,
              server: {
                url: ("https://github.com/HelloAnner/nuntius/releases/download/continuous/" + $serverAsset),
                sha256: $serverSha,
                target: "x86_64-unknown-linux-gnu"
              },
              client: {
                url: ("https://github.com/HelloAnner/nuntius/releases/download/continuous/" + $clientAsset),
                sha256: $clientSha,
                target: "aarch64-apple-darwin"
              }
            }' > manifest.json

      - name: Create continuous release when absent
        if: steps.head.outputs.publish == 'true'
        run: |
          if ! gh release view continuous --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create continuous \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Continuous build" \
              --notes "Rolling self-update channel. The manifest points to immutable assets from the latest successful main build." \
              --prerelease \
              --latest=false
          fi

      - name: Publish binaries then manifest
        if: steps.head.outputs.publish == 'true'
        run: |
          gh release upload continuous \
            release/nuntius-server-linux-x86_64-*.tar.gz \
            release/nuntius-client-macos-arm64-*.tar.gz \
            --repo "$GITHUB_REPOSITORY"
          gh release upload continuous \
            release/manifest.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit continuous \
            --repo "$GITHUB_REPOSITORY" \
            --title "Continuous build · $GITHUB_SHA" \
            --notes "Rolling self-update channel for commit $GITHUB_SHA. The manifest points to immutable commit assets."

      - name: Wake the deployment relay
        if: steps.head.outputs.publish == 'true'
        env:
          UPDATE_NOTICE_URL: ${{ secrets.NUNTIUS_UPDATE_NOTICE_URL }}
          UPDATE_NOTICE_TOKEN: ${{ secrets.NUNTIUS_UPDATE_NOTICE_TOKEN }}
        run: |
          if [ -z "$UPDATE_NOTICE_URL" ] || [ -z "$UPDATE_NOTICE_TOKEN" ]; then
            echo "Update notice secrets are not configured; periodic polling remains active." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          body="$(jq -cn --arg commitSha "$GITHUB_SHA" --argjson releaseSequence "$GITHUB_RUN_ID" '{commitSha:$commitSha,releaseSequence:$releaseSequence}')"
          if ! curl --fail-with-body --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 2 \
            -H "Authorization: Bearer $UPDATE_NOTICE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$body" \
            "$UPDATE_NOTICE_URL"; then
            echo "Update notice delivery failed; periodic polling will reconcile the release." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Add continuous channel to summary
        if: steps.head.outputs.publish == 'true'
        run: |
          {
            echo "## Continuous self-update channel"
            echo
            echo "[Open rolling release](https://github.com/$GITHUB_REPOSITORY/releases/tag/continuous)"
            echo
            echo "Published commit: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"
